name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy to VPS & Compose Up
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: \$\{{ secrets.VPS_HOST }}
          username: root
          key: \$\{{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/swaeduae
            git pull
            docker compose down
            docker compose up -d --build
