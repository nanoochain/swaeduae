version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sawaeduae
      POSTGRES_USER: sawaed
      POSTGRES_PASSWORD: strongpassword
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  web:
    build: .
    command: gunicorn -w 4 -b 0.0.0.0:5000 "sawaed_app:create_app()"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://sawaed:strongpassword@db:5432/sawaeduae
    depends_on:
      - db
volumes:
  db_data:
