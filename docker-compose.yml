version: '3'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: sawaed
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    volumes:
      - swaeduae_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  swaeduae-backend:
    build: ./backend
    command: gunicorn --bind 0.0.0.0:5000 wsgi:app
    volumes:
      - ./backend:/opt/swaeduae/backend
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://postgres:pass@db:5432/sawaed
    depends_on:
      - db
    ports:
      - "5000:5000"
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

volumes:
  swaeduae_db_data:
