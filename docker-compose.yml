version: '3.9'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: sawaed
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    volumes:
      - swaeduae_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  swaeduae-backend:
    build: ./backend
    command: gunicorn --bind 0.0.0.0:5000 wsgi:app
    volumes:
      - ./backend:/opt/swaeduae/backend
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://postgres:pass@db:5432/sawaed
    depends_on:
      - db
    ports:
      - "5000:5000"

  swaeduae-frontend:
    build: ./frontend
    working_dir: /opt/app
    volumes:
      - ./frontend:/opt/app
    command: sh -c "npm install && npm run build"
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/dist:/usr/share/nginx/html
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - swaeduae-backend
      - swaeduae-frontend

volumes:
  swaeduae_db_data:
